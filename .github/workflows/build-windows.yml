name: Build Windows (x86/x64)

# BluePrint の対応表は Windows 10+ (x86/x86_64/arm64) だが、arm64 はこのプロジェクトが
# mise.toml で固定している Odin (dev-2026-07) に windows_arm64 target が存在しないため
# 現時点ではビルド不可能（`odin build <pkg> -target:"?"` の一覧で確認済み、
# phase-10-cicd.md T10-4 の検証ログに記録）。matrix から arm64 を外している。
# Odin が対応し次第、scripts/build_win.ps1 のブロックを外して matrix に追加すること。

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_win.ps1"
      - "scripts/build_sdl2_static.ps1"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-windows.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_win.ps1"
      - "scripts/build_sdl2_static.ps1"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-windows.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Install mise (Odin toolchain, pinned by mise.toml)
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache static SDL2 build
        uses: actions/cache@v4
        with:
          path: build/sdl2
          key: sdl2-static-windows-${{ matrix.arch }}-${{ hashFiles('scripts/build_sdl2_static.ps1') }}

      # x64 のみテスト ROM を使った odin test を実行する（x86 はビルド確認のみ、
      # RAM/実行時間の節約。ロジックは共通なので x64 で通れば x86 も基本的に安全という判断）。
      - name: Cache test ROMs
        if: matrix.arch == 'x64'
        uses: actions/cache@v4
        with:
          path: tests/roms
          key: test-roms-${{ hashFiles('scripts/fetch_test_roms.sh') }}

      - name: Fetch test ROMs
        if: matrix.arch == 'x64'
        shell: bash
        run: ./scripts/fetch_test_roms.sh

      - name: Build (release, static SDL2) and test
        if: matrix.arch == 'x64'
        run: ./scripts/build_win.ps1 --release --test -Architecture ${{ matrix.arch }}

      - name: Build (release, static SDL2)
        if: matrix.arch != 'x64'
        run: ./scripts/build_win.ps1 --release -Architecture ${{ matrix.arch }}

      # x86/arm64 はランナー上でネイティブ実行できない（arm64 はエミュレーション経由になり
      # 不安定なため、スモークは x64 のみとする。BluePrint 対応表・落とし穴欄どおり）。
      - name: Version smoke test (x64 only)
        if: matrix.arch == 'x64'
        run: ./bbl.exe -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbl-windows-${{ matrix.arch }}
          path: bbl.exe
          if-no-files-found: error
