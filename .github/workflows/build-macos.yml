name: Build macOS (x86_64/arm64, separate binaries)

# BluePrint により macOS はユニバーサルではなく別バイナリを配布する。
# GitHub 提供の Apple Silicon ランナー上での x86_64 クロスビルドは実施しておらず、
# 確実性を優先しネイティブ 2 ランナー構成にする（phase-10-cicd.md T10-3 の
# 落とし穴欄が許容する切替）。
# CLAUDE.md が想定する Xcode 26 世代に合わせ macos-26(arm64)/macos-26-intel(x64) を使う
# （2026-02-26 に GA。actions/runner-images の macos-26-Readme.md で確認）。
# SDL2 はシステムにインストール済みのもの（brew install sdl2）に動的リンクする
# （2026-07-16、ユーザー承認により静的リンク方針から変更。phase-10-cicd.md 参照）。

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_macos.sh"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-macos.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_macos.sh"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-macos.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  MACOSX_DEPLOYMENT_TARGET: "13.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs-on: macos-26
          - arch: x86_64
            runs-on: macos-26-intel

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Install mise (Odin toolchain, pinned by mise.toml)
        uses: jdx/mise-action@v2
        with:
          install: true

      # SDL2 はシステムにインストール済みのものへ動的リンクする方針
      # （2026-07-16、ユーザー承認）。vendor:sdl2 の foreign import が渡す
      # 暗黙の -lSDL2 は odin が既定で追加する -L/opt/homebrew/lib・-L/usr/local/lib
      # で自然に解決される（実機確認済み）。
      - name: Install SDL2 via Homebrew
        run: brew install sdl2

      - name: Cache test ROMs
        uses: actions/cache@v4
        with:
          path: tests/roms
          key: test-roms-${{ hashFiles('scripts/fetch_test_roms.sh') }}

      - name: Fetch test ROMs
        run: ./scripts/fetch_test_roms.sh

      - name: Build (release) and test
        run: ./scripts/build_macos.sh --release --test

      - name: Verify SDL2 is linked and binary is single-arch (not universal)
        run: |
          if ! otool -L ./bbl | grep -i sdl; then
            echo "Error: bbl is not linked against SDL2" >&2
            exit 1
          fi
          file ./bbl
          if file ./bbl | grep -qi universal; then
            echo "Error: bbl is a universal binary; BluePrint requires separate arch binaries" >&2
            exit 1
          fi

      - name: Version smoke test
        run: ./bbl -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbl-macos-${{ matrix.arch }}
          path: bbl
          if-no-files-found: error
