name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install mise (Odin toolchain, pinned by mise.toml)
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Fetch test ROMs (stub in phase 0)
        run: ./scripts/fetch_test_roms.sh

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/build_linux.sh --test

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/build_macos.sh --test

      - name: Version smoke test
        run: ./bbl -v
