name: Build Linux (amd64/arm64)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_linux.sh"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-linux.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_linux.sh"
      - "scripts/fetch_test_roms.sh"
      - "mise.toml"
      - ".github/workflows/build-linux.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 でビルドすることで glibc 依存が 22.04+ に留まる
          # （新しいランナーでビルドすると古い OS で動かなくなる）。
          - arch: amd64
            runs-on: ubuntu-22.04
          - arch: arm64
            runs-on: ubuntu-22.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Install mise (Odin toolchain, pinned by mise.toml)
        uses: jdx/mise-action@v2
        with:
          install: true

      # SDL2 はシステムにインストール済みのものへ動的リンクする方針
      # （2026-07-16、ユーザー承認により静的リンク方針から変更。phase-10-cicd.md 参照）。
      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev

      - name: Cache test ROMs
        uses: actions/cache@v4
        with:
          path: tests/roms
          key: test-roms-${{ hashFiles('scripts/fetch_test_roms.sh') }}

      - name: Fetch test ROMs
        run: ./scripts/fetch_test_roms.sh

      - name: Build (release) and test
        run: ./scripts/build_linux.sh --release --test

      - name: Verify SDL2 is linked
        run: |
          if ! ldd ./bbl | grep -i libsdl2; then
            echo "Error: bbl is not linked against libSDL2" >&2
            exit 1
          fi

      - name: Version smoke test
        run: ./bbl -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbl-linux-${{ matrix.arch }}
          path: bbl
          if-no-files-found: error

  publish-release:
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
