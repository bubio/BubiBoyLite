name: Build FreeBSD (x86_64)

# mise の github:odin-lang/Odin バックエンドは GitHub Release のアセットからしか
# インストールできず、Odin は FreeBSD 向けバイナリを配布していない。
# 一方 FreeBSD の pkg には lang/odin（`pkg install odin-lang`）が存在し、
# mise.toml が固定する `dev-2026-07` にほぼ追従したバージョンが配布されている
# （2026-07 時点で確認: freshports.org 上のポートバージョン "2026.07" が
# "dev-2026-07" タグ由来）。そのため、このワークフローだけ mise を使わず
# pkg 経由で Odin を入れる。**pkg のバージョンは mise.toml の固定バージョンと
# 完全一致する保証がない**（ports が追従するタイミング次第でずれ得る）ため、
# 他プラットフォームとバージョンが乖離していないか定期的に確認すること
# （phase-10-cicd.md T10-5 検証ログ参照）。

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_freebsd.sh"
      - "scripts/build_linux.sh"
      - "scripts/build_sdl2_static.sh"
      - "scripts/fetch_test_roms.sh"
      - ".github/workflows/build-freebsd.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/build_freebsd.sh"
      - "scripts/build_linux.sh"
      - "scripts/build_sdl2_static.sh"
      - "scripts/fetch_test_roms.sh"
      - ".github/workflows/build-freebsd.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60 # vmactions の FreeBSD VM 起動 + ソースビルドは遅いので長めに取る

    steps:
      - uses: actions/checkout@v4

      - name: Build and test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          sync: rsync
          # SDL2 のビルド依存パッケージ名は devel/sdl20 の freshports 依存欄に合わせた
          # （x11-toolkits/sdl2 という pkg 名ではなく devel/sdl20 が正式名）。
          # 既知の未解決問題(libusbリンクエラー): SDL2のCMakeLists.txtは*BSDだとHIDAPIをlibusb
          # 専用にするハードコードされた分岐があり（`if(FREEBSD OR NETBSD OR ...)
          # set(HIDAPI_ONLY_LIBUSB TRUE)`）、-DSDL_HIDAPI_LIBUSB=OFFを渡しても
          # `CACHE BOOL "" FORCE`でONに上書きされ無効（実機確認済み）。cmake configureのログには
          # `Found libusb-1.0, version 1.0.16`と出ており、ベースシステムにlibusb自体は存在するが、
          # 最終リンク時に`libusb_get_string_descriptor`等が未定義シンボルになる
          # （純粋なリンク解決の問題であり、パッケージ不足ではない）。`pkg install libusb`は
          # 存在しないパッケージ名で試行しCI自体が失敗したため削除済み（詳細は
          # docs/dev/phases/phase-10-cicd.md T10-5検証ログ参照。実FreeBSD環境での
          # 対話的デバッグが必要、次回セッションへ持ち越し）。
          prepare: |
            pkg install -y odin-lang cmake pkgconf bash curl \
              libX11 libXcursor libXext libXi libXfixes libXrandr libXScrnSaver \
              wayland wayland-protocols libxkbcommon evdev-proto
          run: |
            sh scripts/fetch_test_roms.sh
            sh scripts/build_freebsd.sh --release --test
            if ldd ./bbl | grep -i libsdl2; then
              echo "Error: bbl is dynamically linked against libSDL2" >&2
              exit 1
            fi
            ./bbl -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbl-freebsd-x86_64
          path: bbl
          if-no-files-found: error
